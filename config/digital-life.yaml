persona:
  id: primary
  displayName: Digital Life

ai:
  model: ${DIGITAL_LIFE_AI_MODEL}
  temperature: 0.2
  promptOverrides:
    system: prompts/system.md
    bootstrap: prompts/bootstrap.md

safety:
  defaults:
    read: allow
    write: deny
    execute: deny
  hardDeny: []

denseMem:
  baseUrl: ${DENSE_MEM_URL}
  apiKey: ${DENSE_MEM_API_KEY}
  namespace: digital-life
  timeoutMs: 8000

connectors:
  dense-memory:
    kind: mcp
    enabled: true
    transport:
      type: streamable-http
      url: ${DENSE_MEM_URL}/mcp
      headers:
        authorization: Bearer ${DENSE_MEM_API_KEY}
    headers: {}
    hardDeny: []
  filesystem:
    kind: mcp
    enabled: true
    transport:
      type: process
      command: bunx
      args:
        - "@modelcontextprotocol/server-filesystem"
        - ${LEARNING_DATA_DIR}
    headers:
      x-digital-life: local-dev
    hardDeny:
      - filesystem.write_file
      - filesystem.edit_file
      - filesystem.create_directory
      - filesystem.move_file
    adapter: mcp-filesystem
    scopeDiscovery:
      toolIds:
        - list_directory
      selectionKind: mcp-scope
    learning:
      enumerateToolIds:
        - list_directory
      fetchToolIds:
        - read_file
      defaultMode: baseline
      supportedModes:
        - baseline
        - incremental
        - resync
